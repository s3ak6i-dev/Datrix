# Dev nginx — HTTP only, used by the frontend container in docker-compose.yml.
# For production HTTPS see nginx/nginx.conf.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Support large file uploads (matches MAX_UPLOAD_MB=10240 in .env)
    client_max_body_size 10240m;

    # Security headers
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # API proxy — only used if VITE_API_URL is set to a relative /api path.
    # In the default dev compose VITE_API_URL=http://localhost:8000 (direct),
    # so this block is a passthrough that won't be hit.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        client_max_body_size 10240m;
    }

    # SPA fallback — all non-asset routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

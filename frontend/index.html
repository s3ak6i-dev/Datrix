<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Datrix</title>
    <!-- Apply saved theme before first paint to avoid flash -->
    <script>
      (function () {
        var t = localStorage.getItem('datrix-theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        var tokens = {
          dark: { '--accent':'#63b3ff','--accent-hover':'#7cc0ff','--accent-active':'#4f9fef','--bg':'#050810','--bg-2':'#090d1a','--bg-3':'#11172a','--bg-card':'#0d1220','--bg-inset':'#070b15','--border':'rgba(255,255,255,.07)','--border-strong':'rgba(255,255,255,.15)','--border-accent':'rgba(99,179,255,.28)','--text-primary':'#f0f4ff','--text-secondary':'#7a8aaa','--text-tertiary':'#3d4d6a','--text-on-accent':'#050810','--green':'#34d399','--green-dim':'rgba(52,211,153,.12)','--warn':'#fbbf24','--warn-dim':'rgba(251,191,36,.12)','--bad':'#f87171','--bad-dim':'rgba(248,113,113,.12)','--blue-tint':'rgba(99,179,255,.08)','--blue-glow':'rgba(99,179,255,.22)','--glow':'1','--grid-opacity':'0.03' },
          light: { '--accent':'#2f6fe4','--accent-hover':'#2560cc','--accent-active':'#2257bf','--bg':'#ffffff','--bg-2':'#f4f7fc','--bg-3':'#eaeff8','--bg-card':'#ffffff','--bg-inset':'#f8fafd','--border':'rgba(13,27,51,.10)','--border-strong':'rgba(13,27,51,.22)','--border-accent':'rgba(47,111,228,.32)','--text-primary':'#0d1b33','--text-secondary':'#4a5878','--text-tertiary':'#8a96ad','--text-on-accent':'#ffffff','--green':'#059669','--green-dim':'rgba(5,150,105,.10)','--warn':'#d97706','--warn-dim':'rgba(217,119,6,.10)','--bad':'#dc2626','--bad-dim':'rgba(220,38,38,.10)','--blue-tint':'rgba(47,111,228,.06)','--blue-glow':'rgba(47,111,228,.14)','--glow':'0.4','--grid-opacity':'0.05' }
        };
        var el = document.documentElement;
        el.dataset.theme = t;
        var map = tokens[t] || tokens.dark;
        Object.keys(map).forEach(function(k) { el.style.setProperty(k, map[k]); });
      })();
    </script>
    <!-- Fonts: Inter (display + UI) + IBM Plex Mono (labels + numbers) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

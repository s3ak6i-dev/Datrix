version: "3.9"
# Production compose — HTTPS via Let's Encrypt.
#
# Pre-flight:
#   1. Set DOMAIN: export DOMAIN=your.domain.com
#   2. Run scripts/setup-ssl.sh once to issue the certificate
#   3. docker compose -f docker-compose.production.yml up -d --build
#
# The nginx service is built from nginx/Dockerfile which does a multi-stage
# build: compiles the React frontend, then copies the dist into nginx:alpine.
# No shared volume needed — static files are baked into the image.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        # VITE_API_URL is baked into the compiled JS at build time.
        # Must match your domain — set DOMAIN in your shell before building.
        - VITE_API_URL=https://${DOMAIN}/api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # nginx.conf is mounted so you can tweak it without rebuilding the image
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped

volumes:
  backend_data:
  certbot_certs:
  certbot_www:
